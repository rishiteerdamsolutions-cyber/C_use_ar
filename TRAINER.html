<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web Agency Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a96e;--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;
      --text:#e8e8e8;--muted:#777;--border:#252525;--ok:#86efac;--err:#f87171}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;
       padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.logo{font-size:.95rem;font-weight:700;color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:14px}
#server-status{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#3a3a3a;transition:background .3s}
.dot.ok{background:#86efac}.dot.err{background:#f87171}

/* START BUTTON */
#start-btn{background:var(--gold);color:#000;border:none;border-radius:8px;
           padding:9px 20px;font-weight:700;font-size:.88rem;cursor:pointer;
           display:flex;align-items:center;gap:6px}
#start-btn:hover{opacity:.85}
#start-btn:disabled{opacity:.4;cursor:not-allowed}
#countdown{font-size:.82rem;color:var(--gold);min-width:60px;text-align:right}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 24px}
.tab{padding:13px 20px;cursor:pointer;font-size:.86rem;color:var(--muted);
     border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.tab:hover{color:var(--text)}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
main{padding:28px 24px;max-width:820px}
.panel{display:none}.panel.active{display:block}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:20px;margin-bottom:16px}
.card-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;
            color:var(--muted);margin-bottom:14px}

/* FORM FIELDS */
label.lbl{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;
          font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input.fld,select.fld,textarea.fld{
  width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:9px 13px;font-size:.88rem;outline:none;transition:border-color .2s}
input.fld:focus,select.fld:focus,textarea.fld:focus{border-color:var(--gold)}
select.fld{cursor:pointer}

/* DROPZONE */
.dropzone{border:2px dashed var(--border);border-radius:8px;padding:24px;
          text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.dropzone:hover,.dropzone.drag{border-color:var(--gold)}
.dropzone p{color:var(--muted);font-size:.83rem}
.dropzone strong{color:var(--text)}
#thumb-wrap{margin-top:10px;display:none}
#thumb{width:100%;max-height:160px;object-fit:contain;border-radius:6px;background:#111}

/* BUTTONS */
.btn{padding:10px 22px;border-radius:7px;font-weight:700;font-size:.86rem;cursor:pointer;
     border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover:not(:disabled){opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:#000}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-red{background:transparent;border:1px solid #7f1d1d;color:var(--err)}
.btn-sm{padding:5px 12px;font-size:.76rem}

/* STEP LIST */
.step-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.step-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
          background:var(--bg2);border-radius:7px;border:1px solid var(--border)}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#000;
          font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-info{flex:1}
.step-action{font-size:.72rem;color:var(--gold);font-weight:700;text-transform:uppercase}
.step-desc{font-size:.83rem;color:var(--text);margin-top:2px}
.step-coords{font-size:.7rem;color:var(--muted);margin-top:2px}
.step-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px;
          font-size:.9rem;border-radius:4px}
.step-del:hover{color:var(--err)}

/* WORKFLOW NAME BAR */
.wf-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;
        background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:16px}
.wf-bar-label{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;white-space:nowrap}
.wf-bar input{flex:1;background:transparent;border:none;color:var(--gold);
              font-size:.95rem;font-weight:700;outline:none}
.step-badge{background:#1a1400;border:1px solid #3a2a00;color:var(--gold);
            padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700;white-space:nowrap}

/* LOG */
.log-box{background:#0a0a0a;border:1px solid var(--border);border-radius:7px;
         padding:14px;font-family:'Courier New',monospace;font-size:.76rem;
         height:180px;overflow-y:auto;line-height:1.7;margin-top:12px}
.log-ok{color:var(--ok)}.log-err{color:var(--err)}.log-info{color:var(--muted)}.log-step{color:var(--gold)}

/* ALERT */
.alert{border-radius:7px;padding:10px 14px;font-size:.83rem;margin:10px 0;display:none}
.alert-ok{background:#0a2a12;border:1px solid #15532e;color:var(--ok)}
.alert-err{background:#2a0a0a;border:1px solid #7f1d1d;color:var(--err)}

/* WF LIST */
.wf-item{display:flex;align-items:center;justify-content:space-between;
         padding:11px 14px;background:var(--bg3);border-radius:7px;margin-bottom:7px}
.wf-name{font-weight:600;font-size:.88rem}
.wf-meta{font-size:.72rem;color:var(--muted)}

/* PROGRESS */
.prog-wrap{background:var(--border);border-radius:3px;height:3px;margin:8px 0;display:none}
.prog-bar{height:100%;background:var(--gold);border-radius:3px;transition:width .3s;width:0%}

/* RUN MODE TOGGLE */
.mode-row{display:flex;gap:8px;margin-bottom:14px}
.mode-btn{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:.82rem;
          color:var(--muted);background:var(--bg2);border:1px solid var(--border);
          border-radius:7px;transition:all .2s}
.mode-btn.active{background:#1a1400;border-color:var(--gold);color:var(--gold);font-weight:700}
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Web Agency Trainer</div>
  <div class="hdr-right">
    <div id="server-status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <span id="countdown"></span>
    <button id="start-btn" onclick="startRun()" disabled>▶ START</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('build',this)">🎓 Step Builder</div>
  <div class="tab" onclick="switchTab('run',this)">▶ Run</div>
  <div class="tab" onclick="switchTab('workflows',this)">📋 Saved</div>
</div>

<main>

<!-- ═══════════════ STEP BUILDER ═══════════════ -->
<div class="panel active" id="panel-build">

  <!-- Workflow name bar -->
  <div class="wf-bar">
    <span class="wf-bar-label">Workflow:</span>
    <input type="text" id="wf-name" placeholder="e.g. salon_build" oninput="onWfNameChange()">
    <span class="step-badge" id="step-badge">0 steps</span>
  </div>

  <!-- Action type -->
  <div class="card">
    <div class="card-title">Add a Step</div>

    <label class="lbl">Action Type</label>
    <select class="fld" id="action-type" onchange="onActionChange()" style="margin-bottom:14px">
      <option value="click">🖱 Click — screenshot required, AI finds what to click</option>
      <option value="minimize">🗕 Minimize Window — hide the active window</option>
      <option value="maximize">🗖 Maximize Window — bring window to full size</option>
      <option value="open_chrome">🌐 Open Chrome — launch Google Chrome</option>
      <option value="open_url">🔗 Open URL — default browser (no typing; best for navigation)</option>
      <option value="press_enter">⏎ Press Enter — send Enter key to the focused field / window</option>
      <option value="copy">📋 Copy — ⌘C / Ctrl+C (selection must already be highlighted)</option>
      <option value="paste">📥 Paste — ⌘V / Ctrl+V (clipboard into focused field)</option>
      <option value="type">⌨ Type text — types exactly what you write into the focused field (click the field first)</option>
    </select>

    <div id="desc-row">
      <label class="lbl" id="desc-label">Button / Element to Click</label>
      <input class="fld" type="text" id="step-desc"
             placeholder="e.g. Click the chrome icon on the desktop"
             style="margin-bottom:14px">
    </div>

    <div id="type-text-row" style="display:none">
      <label class="lbl" for="type-text">Text to type (exact characters)</label>
      <textarea class="fld" id="type-text" rows="5" placeholder="Whatever you put here is typed character-for-character after the previous step (e.g. after a click focused the input)."
                style="margin-bottom:14px;resize:vertical;min-height:88px;font-family:inherit"></textarea>
    </div>

    <div id="url-row" style="display:none">
      <label class="lbl" for="step-url">URL to open</label>
      <input class="fld" type="text" id="step-url" placeholder="https://example.com or example.com"
             style="margin-bottom:14px">
    </div>

    <!-- Screenshot upload (only for click) -->
    <div id="screenshot-section">
      <label class="lbl">Screenshot of this step</label>
      <div class="dropzone" id="dropzone"
           onclick="document.getElementById('file-inp').click()"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p style="margin-top:4px;font-size:.72rem">PNG · JPG</p>
        <div id="thumb-wrap"><img id="thumb" alt="preview"></div>
      </div>
      <input type="file" id="file-inp" accept="image/*" style="display:none"
             onchange="handleFile(this.files[0])">
      <label id="live-vision-wrap" style="display:flex;align-items:flex-start;gap:8px;margin-top:12px;font-size:.78rem;color:var(--muted);cursor:pointer;line-height:1.35">
        <input type="checkbox" id="live-vision-at-run" style="accent-color:var(--gold);margin-top:2px;flex-shrink:0"
               onchange="updateAddBtn()">
        <span><strong>Live screen at run</strong> — skip training screenshot; at Run time capture the real screen and use OpenAI/Anthropic vision to find this target from your description (for things that change or were not in a static screenshot).</span>
      </label>
    </div>

    <div id="build-alert" class="alert"></div>

    <div style="display:flex;gap:10px;margin-top:14px;align-items:center">
      <button class="btn btn-gold" id="add-btn" onclick="addStep()" disabled>
        + Add Step
      </button>
      <button class="btn btn-outline" onclick="clearStep()">Clear</button>
      <span id="add-status" style="font-size:.8rem;color:var(--ok)"></span>
    </div>
    <p id="add-step-hint" style="font-size:.72rem;color:var(--muted);margin-top:10px;line-height:1.45;display:none"></p>
  </div>

  <!-- Saved steps list -->
  <div class="card" id="steps-card" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin:0">Saved Steps</div>
      <button class="btn btn-red btn-sm" onclick="clearWorkflow()">🗑 Clear All</button>
    </div>
    <div class="step-list" id="step-list"></div>
    <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
      <button class="btn btn-gold" onclick="runFromBuilder()">▶ Run All Steps Now</button>
      <label style="display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="dry-build" style="accent-color:var(--gold)"> Dry run
      </label>
    </div>
    <div class="log-box" id="build-log" style="display:none"></div>
  </div>

</div>


<!-- ═══════════════ RUN PANEL ═══════════════ -->
<div class="panel" id="panel-run">
  <div class="card">
    <div class="card-title">Select Workflow</div>
    <select class="fld" id="run-wf-select" onchange="loadRunSteps()" style="margin-bottom:14px">
      <option value="">— choose a workflow —</option>
    </select>

    <div id="run-steps-preview" class="step-list" style="margin-bottom:14px"></div>

    <div class="mode-row">
      <div class="mode-btn active" onclick="setMode(this,'fast')">⚡ Fast — replay saved clicks</div>
      <div class="mode-btn" onclick="setMode(this,'smart')">🤖 Smart — AI-assisted</div>
    </div>

    <label style="display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--muted);
                  cursor:pointer;margin-bottom:14px">
      <input type="checkbox" id="dry-run" style="accent-color:var(--gold)"> Dry run (preview, no actual clicks)
    </label>

    <div id="run-alert" class="alert"></div>
    <div class="prog-wrap" id="run-prog-wrap"><div class="prog-bar" id="run-prog-bar"></div></div>
    <div class="log-box" id="run-log"></div>
  </div>
</div>


<!-- ═══════════════ SAVED WORKFLOWS ═══════════════ -->
<div class="panel" id="panel-workflows">
  <div class="card">
    <div class="card-title">Saved Workflows</div>
    <div id="wf-list"><p style="color:var(--muted);font-size:.84rem">Loading…</p></div>
  </div>
</div>

</main>

<script>
const API = 'http://localhost:7788';
let currentFile = null;
let currentSteps = [];
let currentWfName = '';
let runMode = 'fast';

// ── Server health ────────────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(2000)});
    if (r.ok) {
      document.getElementById('dot').className = 'dot ok';
      document.getElementById('status-text').textContent = 'Server online';
      document.getElementById('start-btn').disabled = !currentWfName;
      return true;
    }
  } catch {}
  document.getElementById('dot').className = 'dot err';
  document.getElementById('status-text').textContent = 'Offline — run: python3 dashboard.py';
  document.getElementById('start-btn').disabled = true;
  return false;
}
checkServer();
setInterval(checkServer, 8000);

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'workflows') loadWorkflowsList();
  if (name === 'run') loadRunDropdown();
}

// ── Workflow name ─────────────────────────────────────────────────────────────
let _wfTimer = null;
function onWfNameChange() {
  const name = document.getElementById('wf-name').value.trim();
  currentWfName = name;
  document.getElementById('start-btn').disabled = !name;
  updateAddBtn();
  clearTimeout(_wfTimer);
  if (name) _wfTimer = setTimeout(() => loadWorkflowSteps(name), 500);
  else { currentSteps = []; renderStepList(); }
}

async function loadWorkflowSteps(name) {
  try {
    const r = await fetch(`${API}/workflow/${encodeURIComponent(name)}`, { cache: 'no-store' });
    if (!r.ok) { currentSteps = []; renderStepList(); return; }
    const d = await r.json();
    currentSteps = d.steps || [];
    renderStepList();
  } catch { currentSteps = []; renderStepList(); }
}

// ── Action type change ────────────────────────────────────────────────────────
const ACTION_DEFAULTS = {
  minimize:    'Minimize active window',
  maximize:    'Maximize active window',
  open_chrome: 'Open Google Chrome',
  press_enter: 'Press Enter key',
  copy:        'Copy selection to clipboard',
  paste:       'Paste from clipboard',
};
function onActionChange() {
  const type = document.getElementById('action-type').value;
  const showScreenshot = type === 'click';
  const isType = type === 'type';
  const isOpenUrl = type === 'open_url';
  document.getElementById('screenshot-section').style.display = showScreenshot ? 'block' : 'none';
  document.getElementById('live-vision-wrap').style.display = showScreenshot ? 'flex' : 'none';
  if (!showScreenshot) document.getElementById('live-vision-at-run').checked = false;
  document.getElementById('desc-row').style.display = (isType || isOpenUrl) ? 'none' : 'block';
  document.getElementById('type-text-row').style.display = isType ? 'block' : 'none';
  document.getElementById('url-row').style.display = isOpenUrl ? 'block' : 'none';
  document.getElementById('desc-label').textContent =
    type === 'click' ? 'Button / Element to Click' : 'Description (editable)';
  if (isType) {
    document.getElementById('step-desc').value = '';
    document.getElementById('step-url').value = '';
  } else if (isOpenUrl) {
    document.getElementById('step-desc').value = '';
    document.getElementById('type-text').value = '';
  } else {
    document.getElementById('type-text').value = '';
    document.getElementById('step-url').value = '';
  }
  // Auto-fill description for hardcoded actions (not type — user supplies text in textarea)
  if (!isType && !isOpenUrl && ACTION_DEFAULTS[type]) {
    document.getElementById('step-desc').value = ACTION_DEFAULTS[type];
  } else if (!isType && !isOpenUrl && !ACTION_DEFAULTS[type] && type !== 'click') {
    document.getElementById('step-desc').value = '';
  } else if (!isType && !isOpenUrl && type === 'click') {
    document.getElementById('step-desc').value = '';
  }
  updateAddBtn();
}

// ── File upload ───────────────────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
}
function handleFile(f) {
  if (!f) return;
  currentFile = f;
  const thumb = document.getElementById('thumb');
  if (thumb.src && thumb.src.startsWith('blob:')) URL.revokeObjectURL(thumb.src);
  thumb.src = URL.createObjectURL(f);
  document.getElementById('thumb-wrap').style.display = 'block';
  updateAddBtn();
}

function updateAddBtn() {
  const name = document.getElementById('wf-name').value.trim();
  const desc = document.getElementById('step-desc').value.trim();
  const typeText = document.getElementById('type-text').value;
  const stepUrl = document.getElementById('step-url').value.trim();
  const type = document.getElementById('action-type').value;
  const needsImg = type === 'click';
  const liveAtRun = document.getElementById('live-vision-at-run').checked;
  let ready = false;
  if (type === 'type') {
    ready = !!(name && typeText.length > 0);
  } else if (type === 'open_url') {
    ready = !!(name && stepUrl.length > 0);
  } else if (type === 'click') {
    ready = !!(name && desc && (liveAtRun || currentFile));
  } else {
    ready = !!(name && desc && (!needsImg || currentFile));
  }
  document.getElementById('add-btn').disabled = !ready;
  const hint = document.getElementById('add-step-hint');
  if (type === 'click') {
    hint.style.display = 'block';
    hint.textContent =
      'Either upload a screenshot (saved x,y) or check “Live screen at run” so each Run grabs the current screen and vision finds the target from your description. Set OPENAI_API_KEY (or ANTHROPIC_API_KEY) before starting the server. Optional: TRAINER_LIVE_VISION_CLICKS=1 forces live vision on every click.';
  } else if (type === 'type') {
    hint.style.display = 'block';
    hint.textContent =
      'Uses macOS Accessibility: focus the field first (often a Click step). Run does Cmd+A then Cmd+V. If nothing appears, enable Accessibility for Cursor (or Terminal) and close any password field / Secure Input. Prefer “Open URL” for links — no typing.';
  } else if (type === 'open_url') {
    hint.style.display = 'block';
    hint.textContent =
      'Opens in your default browser via the OS — no simulated keystrokes. Use this instead of typing URLs when automation typing fails.';
  } else if (type === 'copy') {
    hint.style.display = 'block';
    hint.textContent =
      'Sends Copy (⌘C / Ctrl+C). Put a Click (or drag-select) step before this so something is actually selected.';
  } else if (type === 'paste') {
    hint.style.display = 'block';
    hint.textContent =
      'Sends Paste (⌘V / Ctrl+V). Click the target field first so focus is correct.';
  } else {
    hint.style.display = 'none';
    hint.textContent = '';
  }
}
document.getElementById('step-desc').addEventListener('input', updateAddBtn);
document.getElementById('type-text').addEventListener('input', updateAddBtn);
document.getElementById('step-url').addEventListener('input', updateAddBtn);

// ── Add Step ──────────────────────────────────────────────────────────────────
async function addStep() {
  const name = document.getElementById('wf-name').value.trim();
  const desc = document.getElementById('step-desc').value.trim();
  const typeText = document.getElementById('type-text').value;
  const stepUrl = document.getElementById('step-url').value.trim();
  const type = document.getElementById('action-type').value;

  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  document.getElementById('add-status').textContent = '';
  hideAlert('build-alert');

  try {
    if (!await checkServer()) throw new Error('Server offline');

    const form = new FormData();
    form.append('workflow_name', name);
    form.append('action_type', type);
    form.append('description', (type === 'type' || type === 'open_url') ? '' : desc);
    if (type === 'type') form.append('type_text', typeText);
    if (type === 'open_url') form.append('url', stepUrl);
    if (type === 'click' && currentFile) form.append('screenshot', currentFile);
    if (type === 'click') {
      form.append('live_vision', document.getElementById('live-vision-at-run').checked ? '1' : '0');
    }

    const res = await fetch(`${API}/teach/step`, {method:'POST', body: form});
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    const stepNum = data.step;
    const coords  = type === 'click' ? ` (${data.x}, ${data.y})` : '';
    document.getElementById('add-status').textContent = `✓ Step ${stepNum} saved${coords}`;

    // Refresh steps from server
    await loadWorkflowSteps(name);
    clearStep();

  } catch(e) {
    showAlert('build-alert', e.message, 'err');
  }

  btn.disabled = false; btn.textContent = '+ Add Step';
  updateAddBtn();
}

function clearStep() {
  currentFile = null;
  document.getElementById('file-inp').value = '';
  const thumb = document.getElementById('thumb');
  if (thumb.src && thumb.src.startsWith('blob:')) URL.revokeObjectURL(thumb.src);
  thumb.src = '';
  document.getElementById('thumb-wrap').style.display = 'none';
  document.getElementById('type-text').value = '';
  document.getElementById('step-url').value = '';
  // Keep the selected action type so you can add steps 2, 3, 4… (e.g. several minimizes) without resetting to click.
  onActionChange();
  updateAddBtn();
}

// ── Step list render ──────────────────────────────────────────────────────────
function renderStepList() {
  const card = document.getElementById('steps-card');
  const list = document.getElementById('step-list');
  const badge = document.getElementById('step-badge');
  badge.textContent = `${currentSteps.length} step${currentSteps.length !== 1 ? 's' : ''}`;

  if (!currentSteps.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  const icons = {click:'🖱', minimize:'🗕', maximize:'🗖', open_chrome:'🌐', open_url:'🔗', press_enter:'⏎', copy:'📋', paste:'📥', type:'⌨'};
  list.innerHTML = currentSteps.map(s => {
    const icon = icons[s.action_type] || '▶';
    const coordText = s.action_type === 'click'
      ? `<div class="step-coords">x: ${s.x}, y: ${s.y} · ${s.status}${s.live_vision ? ' · <strong>live @ run</strong>' : ''}</div>` : '';
    const body = s.action_type === 'type'
      ? `<div class="step-desc" style="white-space:pre-wrap;word-break:break-word">${escapeHtml(s.type_text || s.description || '')}</div>`
      : s.action_type === 'open_url'
      ? `<div class="step-desc">${escapeHtml(s.url || s.description || '')}</div>`
      : `<div class="step-desc">${escapeHtml(s.description || '')}</div>`;
    return `
      <div class="step-row">
        <div class="step-num">${s.step}</div>
        <div class="step-info">
          <div class="step-action">${icon} ${s.action_type}</div>
          ${body}
          ${coordText}
        </div>
        <button class="step-del" title="Delete step" onclick="deleteStep(${s.step})">✕</button>
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  if (str == null || str === '') return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function deleteStep(num) {
  const name = document.getElementById('wf-name').value.trim();
  if (!name) return;
  try {
    const r = await fetch(`${API}/workflow/${encodeURIComponent(name)}/step/${num}`, {method:'DELETE'});
    const d = await r.json();
    if (d.deleted) await loadWorkflowSteps(name);
  } catch(e) { alert('Delete failed: ' + e.message); }
}

async function clearWorkflow() {
  const name = document.getElementById('wf-name').value.trim();
  if (!name || !confirm(`Delete all steps in "${name}"?`)) return;
  try {
    await fetch(`${API}/workflow/${encodeURIComponent(name)}`, {method:'DELETE'});
    currentSteps = [];
    renderStepList();
  } catch(e) { alert('Failed: ' + e.message); }
}

// ── Run from builder ──────────────────────────────────────────────────────────
async function runFromBuilder() {
  const name = document.getElementById('wf-name').value.trim();
  const dryRun = document.getElementById('dry-build').checked;
  if (!name) return;
  await executeRun(name, dryRun, 'build-log');
}

// ── START button (header) ─────────────────────────────────────────────────────
let countdownTimer = null;
function startRun() {
  const name = currentWfName || document.getElementById('wf-name').value.trim();
  if (!name) return;
  const btn = document.getElementById('start-btn');
  if (countdownTimer) {
    clearInterval(countdownTimer);
    countdownTimer = null;
    btn.textContent = '▶ START';
    document.getElementById('countdown').textContent = '';
    btn.style.background = 'var(--gold)';
    return;
  }
  let sec = 3;
  document.getElementById('countdown').textContent = `Starting in ${sec}…`;
  btn.textContent = '✕ Cancel';
  btn.style.background = '#7f1d1d';
  countdownTimer = setInterval(async () => {
    sec--;
    if (sec > 0) {
      document.getElementById('countdown').textContent = `Starting in ${sec}…`;
    } else {
      clearInterval(countdownTimer); countdownTimer = null;
      btn.textContent = '▶ START'; btn.style.background = 'var(--gold)';
      document.getElementById('countdown').textContent = '';
      // Switch to run tab log
      switchTab('run', document.querySelectorAll('.tab')[1]);
      await executeRun(name, document.getElementById('dry-run').checked, 'run-log');
    }
  }, 1000);
}

// ── Core run function ─────────────────────────────────────────────────────────
async function executeRun(name, dryRun, logId) {
  const logBox = document.getElementById(logId);
  logBox.style.display = 'block';
  const pw = document.getElementById('run-prog-wrap');
  const pb = document.getElementById('run-prog-bar');
  if (pw) { pw.style.display = 'block'; pb.style.width = '0%'; pb.style.background = 'var(--gold)'; }
  hideAlert('run-alert');

  addLog(logId, 'info', `Workflow: "${name}" · ${dryRun ? 'DRY RUN' : 'LIVE'}`);

  try {
    if (!await checkServer()) throw new Error('Server offline');
    if (pw) pb.style.width = '20%';

    const res = await fetch(`${API}/run`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({workflow_name: name, dry_run: dryRun}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Run failed');

    if (pw) pb.style.width = '100%';
    (data.steps || []).forEach(s => {
      const cls = s.status === 'error' ? 'err' : s.status === 'dry_run' ? 'info' : 'ok';
      addLog(logId, cls, `Step ${s.step}: ${s.action} — ${s.status}`);
    });
    addLog(logId, 'ok', `✓ Done — ${data.steps?.length || 0} steps`);
    showAlert('run-alert', dryRun ? '✓ Dry run complete' : '✓ Workflow finished!', 'ok');

  } catch(e) {
    addLog(logId, 'err', `✗ ${e.message}`);
    showAlert('run-alert', e.message, 'err');
    if (pb) pb.style.background = 'var(--err)';
  }
}

function setMode(el, mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); runMode = mode;
}

// ── Run panel ─────────────────────────────────────────────────────────────────
async function loadRunDropdown() {
  try {
    const r = await fetch(`${API}/workflows`, { cache: 'no-store' });
    const d = await r.json();
    const sel = document.getElementById('run-wf-select');
    sel.innerHTML = '<option value="">— choose a workflow —</option>';
    (d.workflows || []).forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.name; opt.textContent = `${w.name}  (${w.total_steps} steps)`;
      sel.appendChild(opt);
    });
    // Pre-select current workflow if set
    if (currentWfName) sel.value = currentWfName;
    loadRunSteps();
  } catch {}
}

async function loadRunSteps() {
  const name = document.getElementById('run-wf-select').value;
  currentWfName = name;
  document.getElementById('start-btn').disabled = !name;
  const preview = document.getElementById('run-steps-preview');
  if (!name) { preview.innerHTML = ''; return; }
  try {
    const r = await fetch(`${API}/workflow/${encodeURIComponent(name)}`, { cache: 'no-store' });
    const d = await r.json();
    const steps = d.steps || [];
    const icons = {click:'🖱', minimize:'🗕', maximize:'🗖', open_chrome:'🌐', open_url:'🔗', press_enter:'⏎', copy:'📋', paste:'📥', type:'⌨'};
    preview.innerHTML = steps.map(s => {
      const body = s.action_type === 'type'
        ? `<div class="step-desc" style="white-space:pre-wrap;word-break:break-word">${escapeHtml(s.type_text || s.description || '')}</div>`
        : s.action_type === 'open_url'
        ? `<div class="step-desc">${escapeHtml(s.url || s.description || '')}</div>`
        : `<div class="step-desc">${escapeHtml(s.description || '')}</div>`;
      return `
      <div class="step-row">
        <div class="step-num">${s.step}</div>
        <div class="step-info">
          <div class="step-action">${icons[s.action_type]||'▶'} ${s.action_type}</div>
          ${body}
        </div>
      </div>`;
    }).join('');
  } catch { preview.innerHTML = ''; }
}

// ── Saved workflows list ──────────────────────────────────────────────────────
async function loadWorkflowsList() {
  const el = document.getElementById('wf-list');
  el.innerHTML = '<p style="color:var(--muted);font-size:.84rem">Loading…</p>';
  try {
    const r = await fetch(`${API}/workflows`, { cache: 'no-store' });
    const d = await r.json();
    const wfs = d.workflows || [];
    if (!wfs.length) {
      el.innerHTML = '<p style="color:var(--muted);font-size:.84rem">No workflows yet. Use Step Builder to create one.</p>';
      return;
    }
    el.innerHTML = wfs.map(w => `
      <div class="wf-item">
        <div>
          <div class="wf-name">${w.name}</div>
          <div class="wf-meta">${w.total_steps} steps</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gold btn-sm" onclick="quickRunWf('${w.name}')">▶ Run</button>
          <button class="btn btn-red btn-sm" onclick="deleteWf('${w.name}')">Delete</button>
        </div>
      </div>`).join('');
  } catch {
    el.innerHTML = '<p style="color:var(--muted);font-size:.84rem">Could not load — is server running?</p>';
  }
}

function quickRunWf(name) {
  currentWfName = name;
  document.getElementById('wf-name').value = name;
  switchTab('run', document.querySelectorAll('.tab')[1]);
  setTimeout(() => { document.getElementById('run-wf-select').value = name; loadRunSteps(); }, 100);
}

async function deleteWf(name) {
  if (!confirm(`Delete workflow "${name}"?`)) return;
  await fetch(`${API}/workflow/${encodeURIComponent(name)}`, {method:'DELETE'});
  loadWorkflowsList();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function addLog(boxId, type, text) {
  const box = document.getElementById(boxId);
  if (!box) return;
  const line = document.createElement('div');
  line.className = `log-${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.className = `alert alert-${type}`; el.style.display = 'block';
}
function hideAlert(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}
</script>
